colorScheme = "fire"
defaultAppearance = "light"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["post"]

[header]
  layout = "hybrid"

[homepage]
  layout = "page"
  showRecent = true
  recentLimit = 10

[article]
  showDate = true
  showAuthor = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true

[list]
  showSummary = true

[sitemap]
  excludedKinds = []