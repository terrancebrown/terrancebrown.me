{{ define "header" }}{{ partials.Include "page-header.html" . }}{{ end }}
{{ define "main" }}
  <article class="cf pa3 pa4-m pa4-l">
    <div class="measure-wide-l center f4 lh-copy nested-copy-line-height nested-links {{ $.Param "text_color" | compare.Default "mid-gray" }}">
      {{ .Content }}
    </div>
  </article>
  <div class="mw8 center ph3 pb6">
    <div class="flex flex-wrap">
      {{ range .Data.Pages }}
        <a href="{{ .RelPermalink }}" class="link f5 fw6 mr3 mb3 ph3 pv2 br2 bg-light-gray hover-bg-silver dark-gray">
          {{ .LinkTitle }} <span class="f6 normal silver">({{ len .Pages }})</span>
        </a>
      {{ end }}
    </div>
  </div>
{{ end }}
